receivers:
  snmp:
    auth:
      bad_auth:
        version: v1
        community: public
    targets:
      - host: 10.0.0.1
        auth: bad_auth
        metric_groups:
          - basic
    metric_groups:
      basic:
        walk: "1.3.6.1.2.1.1"
        metrics:
          - oid: "1.3.6.1.2.1.1.3.0"
            metric_name: snmp.system.uptime
            type: counter
