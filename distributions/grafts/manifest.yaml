dist:
  module: go.olly.garden/grafts/distributions/grafts
  name: grafts
  description: OllyGarden Grafts - OpenTelemetry Collector with NATS JetStream support
  output_path: ./build
  version: 0.1.0

receivers:
  # Core OTLP receiver
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.151.0

  # NATS JetStream receiver (from main module)
  - gomod: go.olly.garden/grafts v0.1.0
    import: go.olly.garden/grafts/receiver/natsjetstreamreceiver
    path: ../..

  # SNMP receiver (from main module)
  - gomod: go.olly.garden/grafts v0.1.0
    import: go.olly.garden/grafts/receiver/snmpreceiver
    path: ../..

processors:
  # Essential processors
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.151.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.151.0

exporters:
  # Core exporters
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.151.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.151.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.151.0

  # NATS JetStream exporter (from main module)
  - gomod: go.olly.garden/grafts v0.1.0
    import: go.olly.garden/grafts/exporter/natsjetstreamexporter
    path: ../..

  # Parquet exporter (from main module)
  - gomod: go.olly.garden/grafts v0.1.0
    import: go.olly.garden/grafts/exporter/parquetexporter
    path: ../..

extensions:
  # Health and observability
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.151.0

connectors:
  # Forward connector for pipeline bridging
  - gomod: go.opentelemetry.io/collector/connector/forwardconnector v0.151.0

providers:
  # Configuration providers
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.57.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.57.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.57.0

conf_resolver:
  default_uri_scheme: env

# Replace directive to use local module
replaces:
  - go.olly.garden/grafts => ../..
